version: '3.8'

# ==============================================================================
# SOTYAI HAKP Network - Production Docker Compose Environment
# ==============================================================================

networks:
  frontend_net:
    driver: bridge
    description: "Network for frontend-facing services (Nginx Gateway to Web/API)"
  backend_net:
    driver: bridge
    description: "Network for backend application services communicating with each other"
  db_net:
    driver: bridge
    description: "Network for internal databases and caching services"

volumes:
  postgres_data:
    name: "sotyai_postgres_data"
  redis_data:
    name: "sotyai_redis_data"
  qdrant_data:
    name: "sotyai_qdrant_data"
  minio_data:
    name: "sotyai_minio_data"

services:
  # ----------------------------------------------------------------------------
  # 1. Nginx Reverse Proxy (Gateway)
  # ----------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: sotyai_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-cache:/var/cache/nginx
    networks:
      - frontend_net
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------------------------
  # 2. Web Frontend (Served via Node.js Express App currently)
  # ----------------------------------------------------------------------------
  web:
    build:
      context: .
      target: production
    container_name: sotyai_web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - frontend_net
      - backend_net
    # No exposed ports; gateway forwards traffic here
    healthcheck:
      test: ["CMD", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 3. Backend API
  # ----------------------------------------------------------------------------
  api:
    build:
      context: .
      target: production
    container_name: sotyai_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - frontend_net # Gateway proxies /api/ here
      - backend_net
      - db_net       # Needs access to databases
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 4. MCP Server
  # ----------------------------------------------------------------------------
  mcp:
    build:
      context: .
      target: production
    container_name: sotyai_mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ROLE=mcp
    networks:
      - frontend_net # Gateway proxies /mcp/ here
      - backend_net
      - db_net
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 5. Worker
  # ----------------------------------------------------------------------------
  worker:
    build:
      context: .
      target: production
    container_name: sotyai_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ROLE=worker
    # No exposed ports, does not receive HTTP traffic
    networks:
      - backend_net
      - db_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 6. Scheduler (Cron)
  # ----------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      target: production
    container_name: sotyai_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ROLE=scheduler
    networks:
      - backend_net
      - db_net
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 7. PostgreSQL Database
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sotyai_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sotyai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sotyai_password_secure}
      - POSTGRES_DB=${POSTGRES_DB:-sotyai_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 8. Redis Cache & Queue
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sotyai_redis
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 9. Vector Database (Qdrant)
  # ----------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sotyai_qdrant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -H \"api-key: $${QDRANT_API_KEY}\" http://localhost:6333/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 10. MinIO (Object Storage)
  # ----------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: sotyai_minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio_admin_password_secure}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      # Expose console if needed via VPS firewall, but container binds it.
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - db_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
